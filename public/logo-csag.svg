<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <!-- Balão amarelo (comunicação) -->
  <rect x="30" y="15" width="260" height="80" rx="40" fill="#FFD100"/>
  <polygon points="70,95 50,125 95,95" fill="#FFD100"/>
  <text x="160" y="68" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-style="italic" font-size="34" fill="#1a1a1a">comunicação</text>
  
  <!-- Balão preto (social Ag) -->
  <rect x="90" y="90" width="210" height="70" rx="35" fill="#2d2d2d"/>
  <polygon points="250,160 275,190 235,160" fill="#2d2d2d"/>
  <text x="165" y="135" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-style="italic" font-size="32" fill="#FFD100">social</text>
  <text x="255" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="20" fill="#ffffff">Ag</text>
</svg>
